version: "3.8"

services:
  db_swarm:
    image: mysql:8.0
    container_name: arti_mysql_swarm
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: arti_swarm
    ports:
      - "3307:3306"
    volumes:
      - ../docker/mysql_swarm:/var/lib/mysql

  # 이 compose 파일은 각 에이전트가 격리된 환경에서 테스트하고 
  # DB 등의 인프라를 필요로 할 때, 기존 포트(3306) 등과 충돌하지 않도록
  # 설계되었습니다. 추가 서비스가 필요한 경우 여기에 기입하세요.
